<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8" />
  <style>
    body {
      font-family: -apple-system, Segoe UI, Roboto, sans-serif;
      width: 300px;
      margin: 0;
      padding: 14px;
      color: #0b2545;
      background: #fff;
    }
    h1 { font-size: 15px; margin: 0 0 2px; }
    .sub { font-size: 11px; color: #64748b; margin: 0 0 12px; }
    label { display: block; font-size: 11px; font-weight: 600; margin: 10px 0 3px; }
    input {
      width: 100%; box-sizing: border-box; padding: 7px 8px;
      border: 1px solid #cbd5e1; border-radius: 6px; font-size: 12px;
    }
    input:focus { outline: none; border-color: #c8102e; }
    button {
      width: 100%; margin-top: 12px; padding: 9px;
      background: #c8102e; color: #fff; border: 0; border-radius: 6px;
      font-size: 13px; font-weight: 600; cursor: pointer;
    }
    button:hover { background: #a60d26; }
    .stat {
      margin-top: 12px; padding: 8px; background: #f1f5f9;
      border-radius: 6px; font-size: 12px; text-align: center;
    }
    .stat b { color: #c8102e; }
    .msg { margin-top: 8px; font-size: 11px; text-align: center; min-height: 14px; }
    .ok { color: #15803d; }
    .err { color: #b91c1c; }
    .hint { font-size: 10px; color: #94a3b8; margin-top: 2px; }
  </style>
</head>
<body>
  <h1>MediaExpres — LinkedIn</h1>
  <p class="sub">Capturare prospecti din LinkedIn.</p>

  <label for="apiKey">Cheie API</label>
  <input type="password" id="apiKey" placeholder="EXTENSION_API_KEY" />
  <p class="hint">O primesti de la administratorul site-ului (env EXTENSION_API_KEY).</p>

  <label for="siteUrl">URL site</label>
  <input type="text" id="siteUrl" placeholder="https://mediaexpress.ro" />

  <label for="dailyCap">Tinta zilnica (recomandat max 25)</label>
  <input type="number" id="dailyCap" min="1" max="200" />

  <button id="save">Salveaza setarile</button>

  <div class="stat">Capturate azi: <b id="todayCount">0</b></div>
  <p class="msg" id="msg"></p>

  <script src="popup.js"></script>
</body>
</html>
